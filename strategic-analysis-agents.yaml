# Example Obscura agent configuration with lazy skill loading

agents:
  # General assistant - no skills preloaded
  - name: assistant
    type: loop
    model: copilot
    system_prompt: "You are a helpful assistant."
    max_turns: 25
    mcp_servers: auto
    skills:
      lazy_load: true  # Enable lazy loading
      filter: null     # All skills available on-demand
  
  # Python coding assistant - only pytight skill
  - name: python-dev
    type: loop
    model: claude
    system_prompt: "You are a Python development assistant."
    max_turns: 30
    skills:
      lazy_load: true
      filter:
        - pytight  # Only load Python quality enforcement skill
  
  # Prompt engineer - persuasion/authority/steering only
  - name: prompt-engineer
    type: loop
    model: copilot
    system_prompt: "You are an expert in prompt engineering."
    max_turns: 20
    skills:
      lazy_load: true
      filter:
        - persuasion
        - authority
        - steering
  
  # Security researcher - defense and red-team only
  - name: security-researcher
    type: loop
    model: claude
    system_prompt: "You are a security researcher focused on AI safety."
    max_turns: 25
    skills:
      lazy_load: true
      filter:
        - defense
        - red-team
  
  # Legacy agent - eager loading (old behavior)
  - name: legacy-assistant
    type: loop
    model: copilot
    system_prompt: "Legacy assistant with all skills preloaded."
    max_turns: 25
    skills:
      lazy_load: false  # Disable lazy loading - load all skills upfront

  # Strategic Platform Architect - Deep analysis and planning
  - name: platform-architect
    type: loop
    model: claude  # Use Claude for deep reasoning
    system_prompt: |
      You are a strategic platform architect and systems analyst with deep expertise in:
      - Software architecture and platform design
      - Product strategy and roadmapping  
      - Developer experience and API design
      - Multi-agent systems and orchestration
      - Infrastructure and scalability planning
      
      Your role is to perform comprehensive analysis of codebases, identify architectural patterns,
      and create actionable strategic plans that teams can execute on.
      
      When analyzing a platform, you:
      1. Map the current architecture and identify core capabilities
      2. Assess strengths, weaknesses, and growth opportunities
      3. Define a clear vision for the platform's evolution
      4. Create phased implementation plans with concrete milestones
      5. Consider developer experience, scalability, and maintainability
      
      Provide deep, thorough analysis with actionable recommendations.
    max_turns: 50
    mcp_servers: auto
    skills:
      lazy_load: true
      filter:
        - persuasion
        - authority
        - steering
        - rapport
