[project]
name = "obscura"
version = "0.2.0"
description = "Obscura - Multi-agent context management with TUI"
requires-python = ">=3.13"
dependencies = [
    "github-copilot-sdk>=0.1.0",
    "claude-agent-sdk>=0.1.0",
    "openai>=1.0.0",
    "httpx>=0.27.0",
    "numpy>=2.1.0",
    "python-jose[cryptography]>=3.3.0",
    "python-dotenv>=1.0.0",
    "pydantic>=2.0",
    "opentelemetry-api>=1.20.0",
    "opentelemetry-sdk>=1.20.0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.20.0",
    "opentelemetry-instrumentation-fastapi>=0.41b0",
    "structlog>=23.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "cryptography>=42.0",
    "click>=8.3.1",
    "fastapi>=0.128.4",
    "rich>=14.3.2",
    "uvicorn>=0.40.0",
    "sse-starlette>=3.2.0",
    "pyright>=1.1.390",
    "ruff>=0.8.0",
    "pytest-cov>=6.0",
]
server = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "python-jose[cryptography]>=3.3.0",
    "httpx>=0.27.0",
    "sse-starlette>=2.1.0",
]
telemetry = [
    "opentelemetry-api>=1.20.0",
    "opentelemetry-sdk>=1.20.0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.20.0",
    "opentelemetry-instrumentation-fastapi>=0.41b0",
    "structlog>=23.0.0",
]
tui = [
    "textual>=0.45.0",
    "rich>=14.0.0",
]
a2a = [
    "redis[hiredis]>=5.0.0",
    "grpcio>=1.60.0",
    "grpcio-tools>=1.60.0",
    "grpcio-reflection>=1.60.0",
    "protobuf>=4.25.0",
]

[project.scripts]
obscura = "sdk.cli.chat_cli:main"
obscura-sdk = "sdk.cli:main"

[dependency-groups]
dev = [
    "click>=8.3.1",
    "fastapi>=0.128.4",
    "httpx>=0.28.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "python-jose>=3.5.0",
    "rich>=14.3.2",
    "sse-starlette>=3.2.0",
    "uvicorn>=0.40.0",
    "pyright>=1.1.390",
    "ruff>=0.8.0",
    "pytest-cov>=6.0",
]

# Package discovery - explicitly define what to include
[tool.setuptools]
packages = ["sdk", "sdk.auth", "sdk.backends", "sdk.cli", "sdk.demo", "sdk.heartbeat", "sdk.mcp", "sdk.parity", "sdk.routes", "sdk.skills", "sdk.tui", "sdk.tui.widgets"]

[tool.setuptools.package-data]
sdk = ["py.typed"]

# Exclude non-package directories
[tool.setuptools.exclude-package-data]
sdk = ["tests/*", "helm/*", "infra/*", "docs/*", "web-ui/*", "examples/*", "scripts/*"]

# End-to-end test configuration
[tool.pytest.ini_options]
testpaths = ["tests", "tests/e2e"]
addopts = "-v --tb=short"
asyncio_mode = "auto"
markers = [
    "e2e: end-to-end tests (slow, require server)",
    "unit: fast unit tests",
    "integration: integration tests",
]

[tool.coverage.run]
source = ["sdk"]
omit = ["sdk/tui/*", "tests/*"]

[tool.coverage.report]
fail_under = 85
show_missing = true
skip_empty = true

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"infra/zitadel/setup.py" = ["E402"]
"scripts/sync.py" = ["F541"]
"scripts/test_server.py" = ["F541"]
"sdk/agent/agent.py" = ["E402"]
"sdk/agent/agents.py" = ["E402"]
"sdk/backends/claude.py" = ["E402"]
"sdk/backends/copilot.py" = ["E402"]
"sdk/backends/localllm.py" = ["E402"]
"sdk/backends/openai_compat.py" = ["E402"]
"sdk/client/__init__.py" = ["E402"]
"sdk/deps/__init__.py" = ["E402"]
"sdk/internal/__init__.py" = ["F403"]
"sdk/mcp/server.py" = ["F811"]
"sdk/routes/admin.py" = ["E741"]
"sdk/tui/app.py" = ["F811"]
"tests/e2e/test_admin_webhooks.py" = ["E741"]
"tests/unit/sdk/auth/test_auth_middleware.py" = ["E402"]
"tests/unit/sdk/core/test_config_env.py" = ["E712"]
"tests/unit/sdk/telemetry/test_telemetry_metrics.py" = ["F401"]
"tests/unit/sdk/test_legacy_module/test_crawlers.py" = ["F401"]
"tests/unit/sdk/test_legacy_module/test_sync_integration.py" = ["F541"]
"tests/unit/sdk/backends/test_copilot_models.py" = ["F405"]
