[project]
name = "obscura"
version = "0.2.0"
description = "Obscura - Multi-agent context management with TUI"
requires-python = ">=3.12"
dependencies = [
    "github-copilot-sdk>=0.1.0",
    "claude-agent-sdk>=0.1.0",
    "httpx>=0.27.0",
    "numpy>=2.1.0",
    "python-jose[cryptography]>=3.3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "cryptography>=42.0",
    "click>=8.3.1",
    "fastapi>=0.128.4",
    "rich>=14.3.2",
    "uvicorn>=0.40.0",
    "sse-starlette>=3.2.0",
]
server = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "python-jose[cryptography]>=3.3.0",
    "httpx>=0.27.0",
    "sse-starlette>=2.1.0",
]
telemetry = [
    "opentelemetry-api>=1.20.0",
    "opentelemetry-sdk>=1.20.0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.20.0",
    "opentelemetry-instrumentation-fastapi>=0.41b0",
    "structlog>=23.0.0",
]
tui = [
    "textual>=0.45.0",
    "rich>=14.0.0",
]

[project.scripts]
obscura = "obscura_cli:main"
obscura-sdk = "sdk.cli:main"

[dependency-groups]
dev = [
    "click>=8.3.1",
    "fastapi>=0.128.4",
    "httpx>=0.28.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "python-jose>=3.5.0",
    "rich>=14.3.2",
    "sse-starlette>=3.2.0",
    "uvicorn>=0.40.0",
]

# Package discovery - explicitly define what to include
[tool.setuptools]
packages = ["sdk", "sdk.tui", "sdk.tui.widgets", "obscura", "obscura.tui", "obscura.tui.screens", "obscura.tui.widgets"]
py-modules = ["obscura_cli"]

[tool.setuptools.package-data]
sdk = ["py.typed"]

# Exclude non-package directories
[tool.setuptools.exclude-package-data]
sdk = ["tests/*", "helm/*", "infra/*", "docs/*", "web-ui/*", "examples/*", "scripts/*"]

# End-to-end test configuration
[tool.pytest.ini_options]
testpaths = ["tests", "tests/e2e"]
addopts = "-v --tb=short"
asyncio_mode = "auto"
markers = [
    "e2e: end-to-end tests (slow, require server)",
    "unit: fast unit tests",
    "integration: integration tests",
]
