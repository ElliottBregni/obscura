id = "obscura-github"
name = "GitHub Tools"
version = "1.0.0"
author = "obscura-team"
source_type = "pip"
runtime_type = "native"
trust_level = "verified"
description = "GitHub repository tools for code search, PR review, and issue management. Reference plugin demonstrating the full Obscura plugin platform.\n"

[config.GITHUB_TOKEN]
type = "string"
required = true
description = "GitHub personal access token or fine-grained token"

[[capabilities]]
id = "repo.read"
description = "Read repository contents, search code, list branches"
tools = [
    "github_search_repo",
    "github_get_file",
    "github_list_branches",
]
requires_approval = false
default_grant = true

[[capabilities]]
id = "pr.comment"
description = "Comment on pull requests"
tools = [
    "github_comment_pr",
]
requires_approval = true
default_grant = false

[[tools]]
name = "github_search_repo"
description = "Search repository contents by keyword or path"
handler = "obscura_github.tools:search_repo"
capability = "repo.read"

[tools.parameters]
type = "object"
required = [
    "owner",
    "repo",
    "query",
]

[tools.parameters.properties.owner]
type = "string"
description = "Repository owner (user or org)"

[tools.parameters.properties.repo]
type = "string"
description = "Repository name"

[tools.parameters.properties.query]
type = "string"
description = "Search query"

[[tools]]
name = "github_get_file"
description = "Get the contents of a file from a repository"
handler = "obscura_github.tools:get_file"
capability = "repo.read"

[tools.parameters]
type = "object"
required = [
    "owner",
    "repo",
    "path",
]

[tools.parameters.properties.owner]
type = "string"
description = "Repository owner"

[tools.parameters.properties.repo]
type = "string"
description = "Repository name"

[tools.parameters.properties.path]
type = "string"
description = "File path within the repository"

[tools.parameters.properties.ref]
type = "string"
description = "Branch, tag, or commit SHA (default HEAD)"

[[tools]]
name = "github_list_branches"
description = "List branches of a repository"
handler = "obscura_github.tools:list_branches"
capability = "repo.read"

[tools.parameters]
type = "object"
required = [
    "owner",
    "repo",
]

[tools.parameters.properties.owner]
type = "string"
description = "Repository owner"

[tools.parameters.properties.repo]
type = "string"
description = "Repository name"

[[tools]]
name = "github_comment_pr"
description = "Add a comment to a pull request"
handler = "obscura_github.tools:comment_pr"
capability = "pr.comment"
side_effects = "write"

[tools.parameters]
type = "object"
required = [
    "owner",
    "repo",
    "pr_number",
    "body",
]

[tools.parameters.properties.owner]
type = "string"
description = "Repository owner"

[tools.parameters.properties.repo]
type = "string"
description = "Repository name"

[tools.parameters.properties.pr_number]
type = "integer"
description = "Pull request number"

[tools.parameters.properties.body]
type = "string"
description = "Comment body (supports Markdown)"

[[workflows]]
id = "review_pull_request"
name = "Review Pull Request"
version = "1.0.0"
description = "Automated pull request review — fetches changed files, analyzes code, and posts a review comment.\n"
required_capabilities = [
    "repo.read",
    "pr.comment",
]
steps = [
    { tool = "github_get_file", description = "Fetch each changed file for analysis" },
    { tool = "github_comment_pr", description = "Post the review summary as a PR comment" },
]

[[instructions]]
id = "github-review-guide"
version = "1.0.0"
scope = "agent"
content = "When reviewing pull requests, check for: security issues (hardcoded secrets, SQL injection, XSS), missing error handling, test coverage gaps, naming consistency, and documentation updates. Be constructive and specific.\n"
priority = 50

[[policy_hints]]
capability_id = "pr.comment"
recommended_action = "approve"
reason = "Write operations on pull requests should require user confirmation"

[[policy_hints]]
capability_id = "repo.read"
recommended_action = "allow"
reason = "Read-only repository access is safe by default"

[healthcheck]
type = "binary"
target = "gh"
interval_seconds = 300
