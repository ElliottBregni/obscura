# Example Obscura agent configuration with lazy skill loading

agents:
  # General assistant - no skills preloaded
  - name: assistant
    type: loop
    model: copilot
    system_prompt: "You are a helpful assistant."
    max_turns: 25
    mcp_servers: auto
    skills:
      lazy_load: true  # Enable lazy loading
      filter: null     # All skills available on-demand
  
  # Python coding assistant - only pytight skill
  - name: python-dev
    type: loop
    model: claude
    system_prompt: "You are a Python development assistant."
    max_turns: 30
    skills:
      lazy_load: true
      filter:
        - pytight  # Only load Python quality enforcement skill
  
  # Prompt engineer - persuasion/authority/steering only
  - name: prompt-engineer
    type: loop
    model: copilot
    system_prompt: "You are an expert in prompt engineering."
    max_turns: 20
    skills:
      lazy_load: true
      filter:
        - persuasion
        - authority
        - steering
  
  # Security researcher - defense and red-team only
  - name: security-researcher
    type: loop
    model: claude
    system_prompt: "You are a security researcher focused on AI safety."
    max_turns: 25
    skills:
      lazy_load: true
      filter:
        - defense
        - red-team
  
  # Legacy agent - eager loading (old behavior)
  - name: legacy-assistant
    type: loop
    model: copilot
    system_prompt: "Legacy assistant with all skills preloaded."
    max_turns: 25
    skills:
      lazy_load: false  # Disable lazy loading - load all skills upfront
