# =============================================================================
# Zitadel Helm chart values — optimized for local K8s (kind)
# =============================================================================
# Usage: helm install zitadel zitadel/zitadel -n obscura -f infra/k8s/zitadel-values.yaml

replicaCount: 1

zitadel:
  masterkey: "MasterkeyNeedsToHave32Characters"
  configmapConfig:
    ExternalSecure: false
    ExternalDomain: localhost
    ExternalPort: 8081
    TLS:
      Enabled: false
    Database:
      cockroach:
        Host: zitadel-cockroachdb
        User:
          Username: root
          SSL:
            Mode: disable
        Admin:
          Username: root
          SSL:
            Mode: disable
    FirstInstance:
      Org:
        Human:
          UserName: "admin@obscura.local"
          Password: "ObscuraDev1!"
  secretConfig: {}

cockroachdb:
  single-node: true
  statefulset:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi
  storage:
    persistentVolume:
      size: 512Mi
