##
## Local Zitadel + CockroachDB stack for Obscura development.
##
## Start:   docker compose up -d
## Stop:    docker compose down
## Logs:    docker compose logs -f zitadel
## Console: http://localhost:8080/ui/console  (admin@zitadel.localhost / Password1!)
##

services:
  cockroachdb:
    image: cockroachdb/cockroach:v24.2.4
    command: start-single-node --insecure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "26257:26257"
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    networks:
      - obscura-net

  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.64.1
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled
    depends_on:
      cockroachdb:
        condition: service_healthy
    environment:
      ZITADEL_DATABASE_COCKROACH_HOST: cockroachdb
      ZITADEL_DATABASE_COCKROACH_PORT: 26257
      ZITADEL_DATABASE_COCKROACH_DATABASE: zitadel
      ZITADEL_DATABASE_COCKROACH_USER_USERNAME: root
      ZITADEL_DATABASE_COCKROACH_USER_SSL_MODE: disable
      ZITADEL_DATABASE_COCKROACH_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin@zitadel.localhost
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "Password1!"
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "8080:8080"
    networks:
      - obscura-net

volumes:
  cockroach-data:

networks:
  obscura-net:
    driver: bridge
