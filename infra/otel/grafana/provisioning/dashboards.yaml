# =============================================================================
# Grafana — Dashboard provisioning
# =============================================================================

apiVersion: 1

providers:
  - name: "Obscura"
    orgId: 1
    folder: "Obscura"
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
