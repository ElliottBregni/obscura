# =============================================================================
# Prometheus — scrape config for local dev
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape OTel Collector's Prometheus exporter (receives metrics via OTLP push)
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    metrics_path: /metrics
