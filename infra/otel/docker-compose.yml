# =============================================================================
# Standalone OTel observability stack for local development
# =============================================================================
# Usage:
#   cd infra/otel
#   docker compose up -d          # start the observability stack
#   docker compose down -v        # tear down (remove volumes)
#
# Endpoints:
#   Jaeger UI:    http://localhost:16686
#   Prometheus:   http://localhost:9090
#   Grafana:      http://localhost:3000 (admin/obscura)
#   OTLP gRPC:    localhost:4317
#   OTLP HTTP:    localhost:4318
# =============================================================================

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: obscura-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics endpoint
      - "13133:13133" # Health check
    networks:
      - obscura-net
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: obscura-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "14250:14250" # gRPC collector
    networks:
      - obscura-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: obscura-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - obscura-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    container_name: obscura-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: obscura
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - jaeger
    networks:
      - obscura-net
    restart: unless-stopped

networks:
  obscura-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
