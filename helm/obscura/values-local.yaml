# =============================================================================
# Obscura — Local/kind cluster overrides
# =============================================================================
# Usage: helm install obscura ./helm/obscura -f helm/obscura/values-local.yaml

image:
  pullPolicy: Never   # pre-loaded into kind via `kind load docker-image`
  tag: "local"

service:
  type: NodePort
  nodePort: 30080

# Disable auth for local dev (or set to false to skip Zitadel requirement)
auth:
  enabled: false
  issuer: "http://zitadel:8080"

# Local telemetry endpoints
telemetry:
  enabled: true
  otelEndpoint: "http://otel-collector.obscura.svc.cluster.local:4317"

# More verbose logging locally
logging:
  level: "DEBUG"
  format: "text"

# Reduced resources for local dev
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Zitadel subchart — reduced footprint
zitadel:
  enabled: true
  replicaCount: 1
  zitadel:
    masterkey: "MasterkeyNeedsToHave32Characters"
    configmapConfig:
      ExternalSecure: false
      ExternalDomain: localhost
      ExternalPort: 8081
      TLS:
        Enabled: false
  cockroachdb:
    single-node: true
    statefulset:
      replicas: 1
    storage:
      persistentVolume:
        size: 512Mi

# No ingress locally
ingress:
  enabled: false

# No autoscaling locally
autoscaling:
  enabled: false
