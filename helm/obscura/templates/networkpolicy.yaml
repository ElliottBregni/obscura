apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "obscura.fullname" . }}
  labels:
    {{- include "obscura.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "obscura.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound HTTP traffic on port 8080
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow traffic to Zitadel (OIDC)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: zitadel
      ports:
        - port: 8080
          protocol: TCP
    # Allow traffic to OTel Collector
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
    # Allow external HTTPS egress (GitHub API, Anthropic API, etc.)
    - ports:
        - port: 443
          protocol: TCP
