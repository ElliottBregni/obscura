apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "obscura.fullname" . }}-config
  labels:
    {{- include "obscura.labels" . | nindent 4 }}
data:
  # Server
  OBSCURA_HOST: "0.0.0.0"
  OBSCURA_PORT: "8080"
  # Auth
  OBSCURA_AUTH_ENABLED: {{ .Values.auth.enabled | quote }}
  # Telemetry
  OTEL_ENABLED: {{ .Values.telemetry.enabled | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.telemetry.otelEndpoint | quote }}
  OTEL_SERVICE_NAME: {{ .Values.telemetry.serviceName | quote }}
  # Logging
  OBSCURA_LOG_LEVEL: {{ .Values.logging.level | quote }}
  OBSCURA_LOG_FORMAT: {{ .Values.logging.format | quote }}
  # Backend
  OBSCURA_DEFAULT_BACKEND: {{ .Values.backends.default | quote }}
