[project]
name = "vault-gen"
version = "0.1.0"
description = "Scaffold Obsidian-compatible git-backed repos for Obscura"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "click>=8.1",
    "httpx>=0.27",
    "pydantic>=2.10",
    "structlog>=24.4",
]

[project.scripts]
vault-gen = "vault_gen.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vault_gen"]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
    "ruff>=0.8",
    "pyright>=1.1",
]

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "B008",   # function calls in default arguments (Click uses this pattern)
]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "strict"
include = ["src", "tests"]
# Resolve third-party deps (pydantic, httpx, structlog, click) from the
# workspace root venv so editor-side pyright matches the CLI run.
venvPath = "../.."
venv = ".venv"
extraPaths = ["src"]
# Tests intentionally probe private helpers and use underspecified dicts.
# Relax the noisiest rules there rather than littering test code with ignores.
executionEnvironments = [
    { root = "tests", reportPrivateUsage = "none", reportMissingTypeArgument = "none", reportMissingParameterType = "none", reportUnknownParameterType = "none", reportUnknownVariableType = "none", reportUnknownArgumentType = "none", reportUnknownMemberType = "none" },
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
