# Default policy for ${name}

[policy]
name = "default"
version = "1"
description = "Baseline operational policy"

[policy.rate_limits]
requests_per_minute = 60
tokens_per_minute = 100_000
max_concurrent_agents = 4

[policy.permissions]
# Agents may read anywhere in the vault.
allow_read = ["**/*"]
# Agents may write only to specific directories.
allow_write = ["Agents/**", "Memory/**", "Logs/**"]
# Agents may not write to config or policy files.
deny_write = ["agents/**", "policies/**", "workspaces/**"]

[policy.git]
# Auto-commit agent output.
auto_commit = true
commit_prefix = "agent:"
# Push after each commit if a remote is configured.
auto_push = false

[policy.safety]
# Reject writes that would modify files outside allow_write.
enforce_write_policy = true
# Log all tool calls.
audit_log = true
