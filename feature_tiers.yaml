  - obscura.tools.system
  - obscura.tools.policy
  - obscura.tools.providers
  - obscura.integrations.mcp
  - obscura.agent
  - obscura.core.agent_loop
  - obscura.telemetry
  - obscura.server
  - obscura.routes
  - obscura.deps
  - obscura.cli
  - obscura.tui
  - obscura.vector_memory
  - obscura.heartbeat

experimental:
