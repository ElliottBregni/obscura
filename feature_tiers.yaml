# Defines stability guarantees per module.
# CI prevents experimental features from leaking into stable imports.

stable:
  - obscura.core
  - obscura.core.client
  - obscura.core.types
  - obscura.core.tools
  - obscura.core.config
  - obscura.core.auth
  - obscura.core.handlers
  - obscura.core.sessions
  - obscura.core.stream
  - obscura.core.paths
  - obscura.core.context
  - obscura.providers
  - obscura.auth
  - obscura.memory

beta:
