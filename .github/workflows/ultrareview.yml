name: Ultrareview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ultrareview:
    runs-on: ubuntu-latest
    # Skip draft PRs and dependabot
    if: >-
      github.event.pull_request.draft == false &&
      github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Set up Python
        run: uv python install 3.13.5

      # `uv sync` honors `[tool.uv.sources]` (openai/codex SDK from GitHub).
      - name: Install Obscura
        run: uv sync --extra dev --extra server

      - name: Fetch PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # `gh pr diff` rejects diffs over 20k lines. We have full history
          # (fetch-depth: 0) so fall back to `git diff` against the merge base
          # when the API path fails.
          set +e
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} > /tmp/pr.diff 2> /tmp/pr.diff.err
          GH_EXIT=$?
          set -e
          if [ "$GH_EXIT" -ne 0 ]; then
            echo "gh pr diff failed (exit $GH_EXIT):"
            cat /tmp/pr.diff.err
            echo "Falling back to local git diff against merge base."
            git fetch --no-tags origin "$BASE_SHA" "$HEAD_SHA" || true
            MERGE_BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
            git diff "$MERGE_BASE" "$HEAD_SHA" > /tmp/pr.diff
          fi
          DIFF_SIZE=$(wc -c < /tmp/pr.diff)
          echo "diff_size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"
          echo "PR diff: $DIFF_SIZE bytes"

      - name: Skip if diff is empty
        if: steps.diff.outputs.diff_size == '0'
        run: echo "No diff found, skipping review."

      - name: Run ultrareview
        if: steps.diff.outputs.diff_size != '0'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OBSCURA_DEFAULT_BACKEND: ${{ vars.ULTRAREVIEW_BACKEND || 'copilot' }}
        run: |
          # Run ultrareview in single-shot mode and capture output
          uv run obscura -b "${OBSCURA_DEFAULT_BACKEND}" \
            -p "/ultrareview ${{ github.event.pull_request.number }}" \
            2>/dev/null | tee /tmp/review.md

          # Trim to GitHub comment size limit (65536 chars)
          head -c 60000 /tmp/review.md > /tmp/review_trimmed.md

      - name: Post review comment
        if: steps.diff.outputs.diff_size != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if we already have a review comment on this PR
          EXISTING=$(gh api \
            repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | startswith("## Ultrareview")) | .id' \
            | head -1)

          BODY="## Ultrareview

          $(cat /tmp/review_trimmed.md)

          ---
          _Reviewed at commit ${{ github.event.pull_request.head.sha }}._"

          if [ -n "$EXISTING" ]; then
            # Update existing comment
            gh api \
              repos/${{ github.repository }}/issues/comments/$EXISTING \
              -X PATCH \
              -f body="$BODY"
            echo "Updated existing review comment."
          else
            # Create new comment
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body "$BODY"
            echo "Posted new review comment."
          fi
