name: Release

# Tag-triggered release pipeline. Validates the tag through the shared CI
# workflow first, then cuts a GitHub Release with a generated changelog.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # ── 1. Run the full CI suite via the reusable ci.yml workflow ─────────────
  # This guarantees the tagged commit passes ruff, pyright, and core tests
  # before we publish a release. Single source of truth — no duplication.
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      pull-requests: read

  # ── 2. Cut the GitHub Release ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges)
          else
            LOG=$(git log --oneline --no-merges | head -30)
          fi
          {
            echo "CHANGELOG<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "obscura ${{ steps.version.outputs.VERSION }}"
          body: |
            ## What's changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---
            **Pipeline**: Ruff ✓ · Pyright strict ✓ · Core tests ✓
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
