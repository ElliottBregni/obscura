name: Pyright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Once ModernizedAI/github-actions is public, replace steps below with:
      # - uses: ModernizedAI/github-actions/pyright@main
      #   with:
      #     python-version: '3.12'
      #     install-command: 'pip install -e ".[dev,server,telemetry,tui]"'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server,telemetry,tui]"

      - name: Run Pyright (strict mode)
        run: pyright
