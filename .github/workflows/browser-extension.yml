name: Browser Extension Tests

# Path-gated at the trigger level: pull_request only fires this workflow when
# the diff touches the extension or its Python host tests. Push to main
# always runs to give a baseline signal on the default branch.

on:
  push:
    # Push validation runs on the long-lived branches so a regression
    # gets caught even when extension work lands without a PR. PRs
    # against either branch follow the same path gate below.
    branches: [main, dev/experimental]
    paths:
      - 'packages/browser-extension/**'
      - 'tests/browser_extension/**'
      - 'obscura/integrations/browser/**'
      - '.github/workflows/browser-extension.yml'
  pull_request:
    branches: [main, dev/experimental]
    paths:
      - 'packages/browser-extension/**'
      - 'tests/browser_extension/**'
      - 'obscura/integrations/browser/**'
      - '.github/workflows/browser-extension.yml'

concurrency:
  group: browser-ext-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.13.5'
  NODE_VERSION: '20'

jobs:
  browser-extension-tests:
    name: Browser extension (Python host + JS)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Python side: host lifecycle, framing, RPC, tool specs ────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Run browser extension Python tests
        run: uv run pytest tests/browser_extension/ -v --tb=short

      # ── JS side: vitest unit tests + puppeteer smoke ─────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/browser-extension/package-lock.json

      - name: Install JS dependencies
        working-directory: packages/browser-extension
        run: npm ci --no-audit --no-fund

      - name: Syntax check panel + service worker
        working-directory: packages/browser-extension
        run: npm run check

      - name: Run JS unit tests (Vitest)
        working-directory: packages/browser-extension
        run: npm test

      - name: Install Xvfb for headful Chrome on CI
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run E2E smoke tests (Puppeteer, layer 1)
        working-directory: packages/browser-extension
        # Puppeteer's bundled Chrome for Testing blocks native messaging
        # under CI; layer 1 covers manifest/JS/element-id regressions
        # without needing the host chain. Layer 2 (full handshake) is
        # gated on OBSCURA_E2E_FULL=1 and only makes sense locally.
        run: xvfb-run --auto-servernum npm run test:e2e
