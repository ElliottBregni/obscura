name: Build and push Obscura image with optional CLIs

on:
  workflow_dispatch:
    inputs:
      install_hf:
        description: 'Install Hugging Face CLI (hf) via pip'
        required: false
        default: 'false'
      install_gws:
        description: 'Install Google Workspace CLI (gws) via npm'
        required: false
        default: 'false'
      install_m365:
        description: 'Install Microsoft 365 CLI (m365) via npm'
        required: false
        default: 'false'

  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/obscura:latest
            ghcr.io/${{ github.repository_owner }}/obscura:${{ github.sha }}
          build-args: |
            INSTALL_HF=${{ inputs.install_hf }}
            INSTALL_GWS=${{ inputs.install_gws }}
            INSTALL_M365=${{ inputs.install_m365 }}
          platforms: linux/amd64,linux/arm64
