name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13.5']
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server,telemetry]"
          pip list

      - name: Verify imports work
        run: |
          python -c "from sdk import ObscuraClient; print('✓ SDK imports work')"
          python -c "from jose import jwt; print('✓ jose imports work')"
          python -c "import httpx; print('✓ httpx imports work')"
          python -c "import click; print('✓ click imports work')"
          python -c "import fastapi; print('✓ fastapi imports work')"

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v --tb=short -m "not e2e" --ignore=tests/e2e/ --cov=sdk --cov-report=term-missing --cov-fail-under=85

      - name: Run E2E tests
        run: |
          ./scripts/run-e2e-tests.sh
