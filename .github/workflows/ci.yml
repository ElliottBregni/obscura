name: CI

# ─────────────────────────────────────────────────────────────────────────────
# CI for the Python codebase. PR runs match main runs — both execute the full
# suite (ruff + pyright + core tests). The path-filter gating that previously
# skipped jobs on docs-only PRs has been removed so PRs and main behave
# identically; this catches regressions that path filters can mask.
#
#   ruff       (lint + format check)
#   pyright    (strict type check)
#   test-core  (fast unit tests)
#       │
#       └──► ci-success  (single required status check)
#
# All Python work runs through `uv sync` so PEP 508 direct URLs in the
# pyproject (e.g. the openai/codex SDK pin) resolve correctly.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  # Allow other workflows (e.g. release.yml) to reuse this pipeline.
  workflow_call:

# Cancel stale runs on PR pushes; let push/tag runs complete.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

env:
  PYTHON_VERSION: '3.13.5'

jobs:
  # ── 1. Lint ───────────────────────────────────────────────────────────────
  ruff:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # ── 2. Type check ─────────────────────────────────────────────────────────
  pyright:
    name: Pyright (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev --extra server --extra telemetry

      - name: Run Pyright (strict mode)
        run: uv run pyright

  # ── 3. Core tests ─────────────────────────────────────────────────────────
  # Only fast in-process tests. Integration / e2e / browser-host tests run
  # in their own workflows (browser-extension.yml) or via opt-in markers.
  test-core:
    name: Core tests (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev --extra server --extra telemetry

      # Run only the `unit` directory and explicitly exclude slow/external
      # markers. `browser` tests live under tests/browser_extension/ and
      # are covered by browser-extension.yml.
      - name: Run core tests
        run: |
          uv run pytest tests/unit \
            --tb=short \
            -m "not integration and not e2e and not browser" \
            --maxfail=5

  # ── 4. Required-check aggregator ──────────────────────────────────────────
  # A single status check that branch protection can require. Passes only
  # when every gated job actually succeeded — no path-filter "skipped"
  # exemptions, since PR runs match main runs.
  ci-success:
    name: CI success
    if: always()
    needs: [ruff, pyright, test-core]
    runs-on: ubuntu-latest
    steps:
      - name: Verify gated jobs
        env:
          RUFF_RESULT: ${{ needs.ruff.result }}
          PYRIGHT_RESULT: ${{ needs.pyright.result }}
          TEST_CORE_RESULT: ${{ needs.test-core.result }}
        run: |
          echo "ruff:       $RUFF_RESULT"
          echo "pyright:    $PYRIGHT_RESULT"
          echo "test-core:  $TEST_CORE_RESULT"

          fail=0
          for job in "ruff:$RUFF_RESULT" "pyright:$PYRIGHT_RESULT" "test-core:$TEST_CORE_RESULT"; do
            name="${job%%:*}"
            result="${job##*:}"
            if [[ "$result" != "success" ]]; then
              echo "::error::Required job '$name' did not pass: $result"
              fail=1
            fi
          done

          if [[ "$fail" == "1" ]]; then
            exit 1
          fi
          echo "All required jobs passed."
