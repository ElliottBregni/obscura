id = "data-gov"
name = "Data.gov"
version = "1.0.0"
author = "obscura-team"
source_type = "builtin"
runtime_type = "native"
trust_level = "builtin"
description = "Data.gov dataset search — query the US federal open data catalog (CKAN API with HTML fallback).\n"

[[capabilities]]
id = "data.gov.search"
description = "Search datasets on catalog.data.gov"
tools = [
    "data_gov.search",
]
requires_approval = false
default_grant = true

[[tools]]
name = "data_gov.search"
description = "Search datasets on catalog.data.gov using CKAN API with HTML fallback"
handler = "obscura.tools.providers.data_gov:search_datasets"
capability = "data.gov.search"
side_effects = "read"

[tools.parameters]
type = "object"
required = [
    "q",
]

[tools.parameters.properties.q]
type = "string"
description = "Search query"

[tools.parameters.properties.rows]
type = "integer"
description = "Number of results to return"

[tools.parameters.properties.start]
type = "integer"
description = "Pagination offset"

[healthcheck]
type = "callable"
target = "obscura.tools.providers.data_gov:search_datasets"
interval_seconds = 600
