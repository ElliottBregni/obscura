services:
  obscura-sdk:
    container_name: obscura-sdk
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - type: bind
        source: /
        target: /host
      - type: bind
        source: ${HOME}/.obscura
        target: /home/obscura/.obscura
      - type: bind
        source: ${HOME}/.config/gh
        target: /home/obscura/.config/gh
      - type: bind
        source: ${HOME}/.claude
        target: /home/obscura/.claude
      - type: bind
        source: ${HOME}/.claude.json
        target: /home/obscura/.claude.json

  web-ui:
    container_name: obscura-web-ui
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: ./web-ui/src
          target: /app/src
        - action: sync
          path: ./web-ui/index.html
          target: /app/index.html
        - action: sync+restart
          path: ./web-ui/vite.config.ts
          target: /app/vite.config.ts
        - action: rebuild
          path: ./web-ui/package.json
        - action: rebuild
          path: ./web-ui/package-lock.json

  redis:
    container_name: redis
    ports:
      - "6379:6379"

  zitadel:
    container_name: zitadel
    ports:
      - "8081:8080"

  cockroachdb:
    container_name: cockroachdb
    ports:
      - "26257:26257"

  otel-collector:
    container_name: otel-collector
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"

  jaeger:
    container_name: jaeger
    ports:
      - "16686:16686"
      - "14250:14250"

  prometheus:
    container_name: prometheus
    ports:
      - "9090:9090"

  grafana:
    container_name: grafana
    ports:
      - "3000:3000"
