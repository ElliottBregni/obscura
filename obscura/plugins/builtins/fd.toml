id = "fd"
name = "fd"
version = "1.0.0"
author = "obscura-team"
source_type = "builtin"
runtime_type = "cli"
trust_level = "builtin"
description = "Fast file search via fd."

[[capabilities]]
id = "dev.fd"
description = "Fast file discovery."
tools = [
    "fd_find",
]
requires_approval = false
default_grant = true

[[tools]]
name = "fd_find"
description = "Find files by pattern with fd."
capability = "dev.fd"
side_effects = "read"
handler = "obscura.tools.providers.agent_primitives:fd_find"

[tools.parameters]
type = "object"
required = ["pattern"]

[tools.parameters.properties.pattern]
type = "string"
description = "Regex pattern to match filenames (e.g. '\\.py$', '\\.txt$'). Not a glob — use regex syntax."

[tools.parameters.properties.path]
type = "string"
description = "Directory to search in (default: current directory)."

[bootstrap]
deps = [
    { type = "brew", package = "fd", optional = true },
]
