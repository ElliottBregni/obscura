id: docker-engine
name: Docker Engine
version: "1.0.0"
author: obscura-team
source_type: builtin
runtime_type: docker
trust_level: builtin
description: Docker runtime inspection primitives.
capabilities:
  - id: infra.docker
    description: Inspect container runtime status.
    tools: [docker_ps]
    requires_approval: true
    default_grant: false
tools:
  - name: docker_ps
    description: List running Docker containers.
    capability: infra.docker
    side_effects: read
    handler: obscura.tools.providers.agent_primitives:docker_ps
bootstrap:
  deps:
    - type: binary
      package: docker
