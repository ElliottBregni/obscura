id: securitytrails
name: SecurityTrails
version: "1.0.0"
author: obscura-team
source_type: builtin
runtime_type: sdk
trust_level: builtin
description: Domain intelligence via SecurityTrails API.
config:
  SECURITYTRAILS_API_KEY:
    type: secret
    required: true
capabilities:
  - id: internet.securitytrails
    description: Historical DNS and domain intelligence.
    tools: [securitytrails_domain]
    requires_approval: false
    default_grant: true
tools:
  - name: securitytrails_domain
    description: Fetch SecurityTrails domain details.
    capability: internet.securitytrails
    side_effects: read
    handler: obscura.tools.providers.agent_primitives:securitytrails_domain
