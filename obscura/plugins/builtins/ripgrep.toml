id = "ripgrep"
name = "ripgrep"
version = "1.0.0"
author = "obscura-team"
source_type = "builtin"
runtime_type = "cli"
trust_level = "builtin"
description = "Fast code and text search via rg."

[[capabilities]]
id = "dev.ripgrep"
description = "Search files rapidly with ripgrep."
tools = [
    "rg_search",
]
requires_approval = false
default_grant = true

[[tools]]
name = "rg_search"
description = "Search text pattern with rg."
capability = "dev.ripgrep"
side_effects = "read"
handler = "obscura.tools.providers.agent_primitives:rg_search"

[tools.parameters]
type = "object"
required = ["pattern"]

[tools.parameters.properties.pattern]
type = "string"
description = "Regex pattern to search for."

[tools.parameters.properties.path]
type = "string"
description = "File or directory to search in (default: current directory)."

[bootstrap]
deps = [
    { type = "binary", package = "rg" },
]
