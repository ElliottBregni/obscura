id: grafana
name: Grafana
version: "1.0.0"
author: obscura-team
source_type: builtin
runtime_type: service
trust_level: builtin
description: Grafana dashboard and API integration.
config:
  GRAFANA_URL:
    type: string
    required: false
  GRAFANA_TOKEN:
    type: secret
    required: false
capabilities:
  - id: observability.grafana
    description: Read Grafana API and dashboards.
    tools: [grafana_api]
    requires_approval: false
    default_grant: true
tools:
  - name: grafana_api
    description: Call Grafana API endpoint.
    capability: observability.grafana
    side_effects: read
    handler: obscura.tools.providers.agent_primitives:grafana_api
