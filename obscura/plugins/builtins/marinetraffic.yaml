id: marinetraffic
name: MarineTraffic
version: "1.0.0"
author: obscura-team
source_type: builtin
runtime_type: service
trust_level: builtin
description: Vessel and route intelligence via MarineTraffic API.
config:
  MARINETRAFFIC_API_KEY:
    type: secret
    required: true
capabilities:
  - id: logistics.marinetraffic
    description: Query marine traffic intelligence.
    tools: [marinetraffic_call]
    requires_approval: false
    default_grant: true
tools:
  - name: marinetraffic_call
    description: Call MarineTraffic endpoint path.
    capability: logistics.marinetraffic
    side_effects: read
    handler: obscura.tools.providers.agent_primitives:marinetraffic_call
