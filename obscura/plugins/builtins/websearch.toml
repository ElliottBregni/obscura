id = "websearch"
name = "Web Search CLI"
version = "1.0.0"
source_type = "builtin"
runtime_type = "cli"
trust_level = "builtin"
author = "obscura-team"
description = "Web search via the websearch Rust CLI binary. Provides web search, news search, image search, and URL summarization.\n"

[[capabilities]]
id = "search.web"
description = "Search the web and retrieve results"
tools = [
    "websearch_search",
    "websearch_news",
    "websearch_images",
    "websearch_summarize",
]
requires_approval = false
default_grant = true

[[tools]]
name = "websearch_search"
description = "Search the web"
capability = "search.web"
side_effects = "read"
handler = "obscura.tools.providers.websearch:_handler_search"

[tools.parameters]
type = "object"
required = ["query"]

[tools.parameters.properties.query]
type = "string"
description = "Search query."

[tools.parameters.properties.num_results]
type = "integer"
description = "Number of results to return (default 10)."

[tools.parameters.properties.provider]
type = "string"
description = "Search provider: 'duckduckgo' (default), 'brave', 'google'."

[[tools]]
name = "websearch_news"
description = "Search news articles"
capability = "search.web"
side_effects = "read"
handler = "obscura.tools.providers.websearch:_handler_news"

[tools.parameters]
type = "object"
required = ["query"]

[tools.parameters.properties.query]
type = "string"
description = "News search query."

[tools.parameters.properties.num_results]
type = "integer"
description = "Number of results to return (default 10)."

[tools.parameters.properties.provider]
type = "string"
description = "Search provider: 'duckduckgo' (default), 'brave', 'google'."

[[tools]]
name = "websearch_images"
description = "Search images"
capability = "search.web"
side_effects = "read"
handler = "obscura.tools.providers.websearch:_handler_images"

[tools.parameters]
type = "object"

[tools.parameters.properties]

[[tools]]
name = "websearch_summarize"
description = "Summarize a URL"
capability = "search.web"
side_effects = "read"
handler = "obscura.tools.providers.websearch:_handler_summarize"

[tools.parameters]
type = "object"
required = ["url"]

[tools.parameters.properties.url]
type = "string"
description = "URL to summarize."

[bootstrap]
deps = [
    { type = "cargo", package = "websearch", optional = true },
    { type = "binary", package = "websearch", optional = true },
]
check_command = "websearch --version"

[healthcheck]
type = "binary"
target = "websearch"
interval_seconds = 300
