id = "fzf"
name = "fzf"
version = "1.0.0"
author = "obscura-team"
source_type = "builtin"
runtime_type = "cli"
trust_level = "builtin"
description = "Fuzzy matching and filtering via fzf."

[[capabilities]]
id = "dev.fzf"
description = "Fuzzy text filtering."
tools = [
    "fzf_filter",
]
requires_approval = false
default_grant = true

[[tools]]
name = "fzf_filter"
description = "Filter candidate text with fzf."
capability = "dev.fzf"
side_effects = "read"
handler = "obscura.tools.providers.agent_primitives:fzf_filter"

[tools.parameters]
type = "object"
required = ["query", "input_text"]

[tools.parameters.properties.query]
type = "string"
description = "fzf filter query string."

[tools.parameters.properties.input_text]
type = "string"
description = "Newline-separated list of candidates to filter."

[bootstrap]
deps = [
    { type = "brew", package = "fzf", optional = true },
]
