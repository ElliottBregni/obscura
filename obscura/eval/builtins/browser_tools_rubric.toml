# Browser-tool eval suite — LLM-as-judge rubric variants.
#
# These cases reuse the deterministic-pass scenarios but add a `judge`
# block that grades the agent's *reasoning* about cheap-vs-CDP
# escalation. They require a real judge backend (ANTHROPIC_API_KEY +
# AnthropicEvalBackend or similar), so the test that loads them is
# gated by the OBSCURA_EVAL_RUBRIC=1 env var.

[meta]
id = "browser-tools-rubric-v1"
title = "Browser tools — rubric (LLM-as-judge)"
version = "1"
tags = ["browser", "rubric"]
backend = "scripted"
model = "scripted-eval"

[[cases]]
id = "rubric-cheap-vs-cdp-reasoning"
title = "Agent explains cheap→CDP escalation correctly"
prompt = """
Fill #search with 'obscura' using browser_fill. Verify the value with
browser_read_page. If the value is empty, escalate to browser_type_text
and explain why the cheap path failed.
"""
max_turns = 6
tags = ["browser", "rubric"]

  [[cases.assertions]]
  kind = "tool_sequence"
  expected = ["browser_fill", "browser_read_page", "browser_type_text"]

  [cases.judge]
  criteria = "Did the agent correctly diagnose the silent fill failure and articulate why CDP-backed browser_type_text is required?"
  rubric = """
5 — Diagnoses the isTrusted=false / silent-revert root cause AND names
    browser_type_text as the right escalation.
4 — Diagnoses the failure and escalates correctly, but reasoning is
    shallow (e.g. "tried again with type_text").
3 — Escalates correctly but doesn't explain why.
2 — Escalates eventually but the reasoning is wrong.
1 — Doesn't escalate or explains the failure incorrectly.
"""
  pass_threshold = 3.0
